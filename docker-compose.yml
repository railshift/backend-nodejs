version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: railway-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: railway_user
      POSTGRES_PASSWORD: railway_password
      POSTGRES_DB: railway_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U railway_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - railway-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: railway-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - railway-network

  # Node.js Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: railway-app
    restart: unless-stopped
    ports:
      - "8000:8000"
      - "9090:9090"
    environment:
      NODE_ENV: production
      PORT: 8000
      DATABASE_URL: postgresql://railway_user:railway_password@postgres:5432/railway_db?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    networks:
      - railway-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Prometheus (Monitoring)
  prometheus:
    image: prom/prometheus:latest
    container_name: railway-prometheus
    restart: unless-stopped
    ports:
      - "9091:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    networks:
      - railway-network

  # Grafana (Visualization)
  grafana:
    image: grafana/grafana:latest
    container_name: railway-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: false
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - railway-network

networks:
  railway-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
