# This is a template. Create actual secret using:
# kubectl create secret generic railway-secrets \
#   --from-literal=DATABASE_URL='postgresql://user:pass@host:5432/db' \
#   --from-literal=JWT_ACCESS_SECRET='your-secret' \
#   --from-literal=JWT_REFRESH_SECRET='your-secret' \
#   -n railway-system

apiVersion: v1
kind: Secret
metadata:
  name: railway-secrets
  namespace: railway-system
type: Opaque
stringData:
  DATABASE_URL: "postgresql://railway_user:railway_password@railway-postgres-service:5432/railway_db?schema=public"
  JWT_ACCESS_SECRET: "change-this-in-production-super-secret-key"
  JWT_REFRESH_SECRET: "change-this-in-production-refresh-secret-key"
  REDIS_PASSWORD: ""
