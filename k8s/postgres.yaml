apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: railway-postgres
  namespace: railway-system
spec:
  serviceName: railway-postgres-service
  replicas: 1
  selector:
    matchLabels:
      app: railway-postgres
  template:
    metadata:
      labels:
        app: railway-postgres
    spec:
      containers:
      - name: postgres
        image: postgres:16-alpine
        ports:
        - containerPort: 5432
          name: postgres
        env:
        - name: POSTGRES_USER
          value: "railway_user"
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: railway-secrets
              key: POSTGRES_PASSWORD
              optional: true
        - name: POSTGRES_DB
          value: "railway_db"
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          exec:
            command:
            - sh
            - -c
            - pg_isready -U railway_user
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
            - sh
            - -c
            - pg_isready -U railway_user
          initialDelaySeconds: 5
          periodSeconds: 5
  volumeClaimTemplates:
  - metadata:
      name: postgres-storage
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: railway-postgres-service
  namespace: railway-system
spec:
  ports:
  - port: 5432
    targetPort: 5432
  clusterIP: None
  selector:
    app: railway-postgres
